version: '3.8'

services:
  api-gateway:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - inventory-service
      - websocket-service

  inventory-service:
    build: ./inventory-service
    environment:
      - REDIS_URL=redis://redis-cluster:6379
      - DB_URL=postgres://user:pass@postgres-db:5432/inventory
    deploy:
      replicas: 3 # Simulate horizontal scaling

  websocket-service:
    build: ./websocket-service
    environment:
      - REDIS_URL=redis://redis-cluster:6379
    ports:
      - "8081:8081"

  redis-cluster:
    image: redis:alpine
    ports:
      - "6379:6379"

  postgres-db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=inventory
    ports:
      - "5432:5432"
